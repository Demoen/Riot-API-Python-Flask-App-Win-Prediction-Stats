<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoL Win Predictor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container">
        <h1>League of Legends<br>Win Predictor</h1>

        <div class="search-box">
            {% if error %}
            <div class="error-msg">{{ error }}</div>
            {% endif %}

            <form action="/summoner" method="POST">
                <h3 style="margin-bottom: 1.5rem;">Enter Riot ID</h3>
                <input type="text" name="riot_id" placeholder="GameName#TagLine" required>
                <button type="submit">Analyze Profile</button>
            </form>
            <p style="margin-top: 1rem; color: var(--text-secondary); font-size: 0.9rem;">
                Example: Agurin#EUW, Hide on bush#KR1
            </p>
        </div>
    </div>
</body>

</html>
