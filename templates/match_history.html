<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Match History - {{ game_name }}#{{ tag_line }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
            <h2>Match History: <span style="color: var(--accent-color);">{{ game_name }}#{{ tag_line }}</span></h2>
            <a href="/" style="color: var(--text-secondary); text-decoration: none;">&larr; Back to Search</a>
        </div>

        <div class="card text-center mb-4">
            <p style="color: var(--text-secondary); margin-bottom: 1rem;">Ready to analyze your performance?</p>
            <form action="/analyze_matches" method="POST">
                <button type="submit">Analyze Last 20 Matches</button>
            </form>
        </div>

        <div class="match-list">
            {% for match in matches %}
            <div class="match-item">
                <div>
                    <span style="font-weight: bold; color: var(--text-secondary);">Match ID:</span> {{ match }}
                </div>
                <!-- In a full app, we'd show KDA, Champ, etc. here -->
            </div>
            {% endfor %}
        </div>
    </div>
</body>

</html>
